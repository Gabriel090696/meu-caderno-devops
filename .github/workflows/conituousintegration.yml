name: Continuous Integration

on:
  push:
    branches: [ main, resumo-devops ]
  pull_request:
    types: [ opened, reopened, synchronized ]
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Verificar sintaxe do código
        run: |
          # Verifica se o arquivo existe antes de compilar
          if [ -f app.py ]; then python -m py_compile app.py; fi

  notify_discord:
    needs: build # Faz com que a notificação espere o build terminar
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        uses: stegzilla/discord-notify@v2
        with:
          webhook_url: ${{ secrets.DISCORDWBHOOK }} # Recomendado usar Secrets!
          title: "New PR: ${{ github.event.pull_request.title }}"
          message: |
            **Creator:** ${{ github.event.pull_request.user.login }}
            **URL:** ${{ github.event.pull_request.html_url }}
          include_image: true
          avatar_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
          username: GitHub PR Notifier