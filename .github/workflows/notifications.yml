name: Discord Notifications

on:
  pull_request:
    types: [opened, reopened, synchronized]
  workflow_run:
    workflows: ["CI/CD Pipeline"] # Nome exato do seu outro arquivo de Pipeline
    types: [completed]

jobs:
  # 1. Notificação de Novo PR (Sucesso/Abertura)
  notify_pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        uses: stegzilla/discord-notify@v2
        with:
          webhook_url: ${{ secrets.DISCORDWBHOOK }}
          title: "🚀 New PR: ${{ github.event.pull_request.title }}"
          message: |
            **Creator:** ${{ github.event.pull_request.user.login }}
            **URL:** ${{ github.event.pull_request.html_url }}
          include_image: true
          username: GitHub PR Notifier

  # 2. Notificação de Falha no Pipeline
  notify_failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Send Failure Alert
        uses: stegzilla/discord-notify@v2
        with:
          webhook_url: ${{ secrets.DISCORDWBHOOK }}
          title: "❌ Falha Detectada no Pipeline!"
          message: |
            **Workflow:** ${{ github.event.workflow_run.name }}
            **Tentativa:** #${{ github.event.workflow_run.run_attempt }}
            **Link do Erro:** ${{ github.event.workflow_run.html_url }}
          include_image: true
          username: GitHub Alerta de Erro